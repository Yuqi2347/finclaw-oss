        font-size: 40px;
        font-weight: 800;
        fill: #172033;
        letter-spacing: 0.1px;
      }
      .subtitle {
        font-family: "Aptos", "Segoe UI", "Inter", "Noto Sans", sans-serif;
        font-size: 20px;
        font-weight: 500;
        fill: #596579;
